<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
    body {
        margin: 0;
        font-family: 'Inter', sans-serif;
        background: linear-gradient(135deg, #1e3a8a, #2563eb);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .card {
        background: white;
        padding: 40px;
        width: 380px;
        border-radius: 12px;
        box-shadow: 0 20px 40px rgba(0,0,0,0.15);
    }

    h2 {
        text-align: center;
        margin-bottom: 25px;
    }

    input {
        width: 100%;
        padding: 12px;
        margin-bottom: 18px;
        border: 1px solid #ccc;
        border-radius: 8px;
    }

    button {
        width: 100%;
        padding: 12px;
        background: #2563eb;
        color: white;
        border: none;
        border-radius: 8px;
        font-weight: 600;
        cursor: pointer;
    }

    button:hover {
        background: #1e40af;
    }

    .messages {
        margin-bottom: 15px;
        color: red;
        font-size: 14px;
    }

    .footer {
        text-align: center;
        margin-top: 15px;
        font-size: 13px;
    }

    .footer a {
        text-decoration: none;
        color: #2563eb;
    }
</style>
</head>

<body>

<div class="card">
    <h2>Login</h2>

    {% if messages %}
        {% for message in messages %}
            <div class="messages">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    <form method="POST">
        {% csrf_token %}
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>

    <div class="footer">
        Don't have an account?
        <a href="{% url 'register' %}">Register</a>
    </div>
</div>

</body>
</html>
