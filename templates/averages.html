<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Averages Calculator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        table {
            border-collapse: collapse;
            width: 50%;
            margin-bottom: 20px;
        }
        th, td {
            border: 1px solid #444;
            padding: 8px;
            text-align: center;
        }
        th {
            background: #eee;
        }
        input {
            width: 90%;
            padding: 5px;
        }
        .btn {
            padding: 10px 15px;
            background: #28a745;
            color: white;
            border: none;
            cursor: pointer;
        }
        .btn:hover {
            background: #218838;
        }
    </style>
</head>
<body>
    <h2>Mean Calculator (AM, GM, HM)</h2>

 <form method="post">
    {% csrf_token %}
    <table>
        <tr>
            <th>x (Values)</th>
            <th>f (Frequencies)</th>
        </tr>
        {% for i in "1234"|make_list %}
        <tr>
            <td>
                <input type="number" name="x" step="any"
                       value="{{ x_values.counter0 }}">
            </td>
            <td>
                <input type="number" name="f" step="any"
                       value="{{ f_values.counter0 }}">
            </td>
        </tr>
        {% endfor %}
    </table>
    <button type="submit" class="btn">Calculate</button>
</form>




    <!-- Results -->
    {% if am %}
    <h3>Results</h3>
    <table>
        <tr>
            <th>Arithmetic Mean</th>
            <th>Geometric Mean</th>
            <th>Harmonic Mean</th>
        </tr>
        <tr>
            <td>{{ am|floatformat:3 }}</td>
            <td>{{ gm|floatformat:3 }}</td>
            <td>{{ hm|floatformat:3 }}</td>
        </tr>
    </table>
    {% endif %}
</body>
</html>
